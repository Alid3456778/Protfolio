<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Projects | ALidShaikh's</title>
    <meta
      name="description"
      content="All projects by ALid Shaikh, presented in the same portfolio style."
    />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button
      class="hamburger-btn"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="menu"
    >
      <span class="hamburger-icon"></span>
    </button>

    <aside class="menu-overlay" id="menu" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="menu-container">
        <nav>
          <ul>
            <li tabindex="0"><a href="index.html#home" onclick="closeMenu()">HOME</a></li>
            <li tabindex="0"><a href="index.html#aboutus" onclick="closeMenu()">ABOUT</a></li>
            <li tabindex="0"><a href="#project" onclick="closeMenu()">PROJECT</a></li>
            <li tabindex="0"><a href="index.html#certificate" onclick="closeMenu()">CERTIFICATE</a></li>
            <li tabindex="0"><a href="index.html#skill" onclick="closeMenu()">SKILL</a></li>
            <li tabindex="0"><a href="index.html#contactus" onclick="closeMenu()">CONTACT</a></li>
          </ul>
        </nav>
        <div class="contact-info">
          <div>EMAIL ADDRESS</div>
          <div class="email">alidshaikh05@gmail.com</div>
        </div>
        <button class="close-btn" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </aside>

    <main class="projects-page-shell">
      <!-- <section class="projects-page-intro">
        <p class="projects-page-kicker">Portfolio</p>
        <h1 class="projects-page-heading">All Projects</h1>
        <p class="projects-page-text">
          A complete collection of my featured work in the same visual style as the main portfolio.
        </p>
        <div class="projects-actions">
          <a href="index.html" class="project-link">Back Home</a>
        </div>
      </section> -->

      <section class="projects-section" id="project">
        <div class="projects-container">
          <h2 class="projects-title">
            <span class="char">P</span>
            <span class="char">R</span>
            <span class="char">O</span>
            <span class="char">J</span>
            <span class="char">E</span>
            <span class="char">C</span>
            <span class="char">T</span>
            <span class="char">S</span>
          </h2>
          <div id="projectsList"></div>
        </div>
      </section>
    </main>

    <script>
      const hamburgerButton = document.querySelector(".hamburger-btn");
      const menuOverlay = document.querySelector(".menu-overlay");
      const closeButton = document.querySelector(".close-btn");

      function openMenu() {
        menuOverlay.classList.add("active");
        menuOverlay.setAttribute("aria-hidden", "false");
        hamburgerButton.setAttribute("aria-expanded", "true");
        document.body.style.overflow = "hidden";
        const firstLink = menuOverlay.querySelector("nav ul li");
        firstLink?.focus();
      }

      function closeMenu() {
        menuOverlay.classList.remove("active");
        menuOverlay.setAttribute("aria-hidden", "true");
        hamburgerButton.setAttribute("aria-expanded", "false");
        document.body.style.overflow = "";
        hamburgerButton.focus();
      }

      hamburgerButton.addEventListener("click", () => {
        if (menuOverlay.classList.contains("active")) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      closeButton.addEventListener("click", closeMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && menuOverlay.classList.contains("active")) {
          closeMenu();
        }
      });

      menuOverlay.addEventListener("click", (e) => {
        if (e.target === menuOverlay) {
          closeMenu();
        }
      });

      function renderProjects(projects) {
        const projectsList = document.getElementById("projectsList");
        projectsList.innerHTML = projects
          .map(
            (project, index) => {
              const number = String(index + 1).padStart(2, "0");
              return `
              <div class="project-item">
                <div class="project-number" data-number="${index + 1}">
                  <div class="number">${number}</div>
                </div>
                <div class="project-details">
                  <div class="project-image">
                    <img src="${project.image}" alt="${project.alt}" />
                  </div>
                  <h3 class="project-title">${project.title}</h3>
                  <p class="project-description">${project.description}</p>
                  <div class="project-tech">
                    ${project.tech
                      .map((item) => `<span class="tech-tag">${item}</span>`)
                      .join("")}
                  </div>
                  <a href="${project.link}" class="project-link">View Project</a>
                </div>
              </div>
            `;
            }
          )
          .join("");
      }

      function initProjectAnimations() {
        gsap
          .timeline({
            scrollTrigger: {
              trigger: ".projects-title",
              start: "top 80%",
              toggleActions: "play none none reverse",
            },
          })
          .to(".projects-title .char", {
            y: 0,
            opacity: 1,
            duration: 0.6,
            stagger: 0.05,
            ease: "back.out(1.7)",
          });

        gsap.utils.toArray(".project-item").forEach((item) => {
          const number = item.querySelector(".project-number");
          const details = item.querySelector(".project-details");

          gsap.to(details, {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power3.out",
            scrollTrigger: {
              trigger: item,
              start: "top 80%",
              end: "top 30%",
              scrub: 1,
            },
          });

          ScrollTrigger.create({
            trigger: item,
            start: "top center",
            end: "bottom center",
            onEnter: () => number.classList.add("active"),
            onEnterBack: () => number.classList.add("active"),
            onLeave: () => number.classList.remove("active"),
            onLeaveBack: () => number.classList.remove("active"),
          });
        });
      }

      async function initProjectsPage() {
        try {
          const response = await fetch("./project.json");
          if (!response.ok) {
            throw new Error("Failed to load project data");
          }

          const projects = await response.json();
          renderProjects(projects);
          gsap.registerPlugin(ScrollTrigger);
          initProjectAnimations();
        } catch (error) {
          document.getElementById("projectsList").innerHTML =
            '<p class="projects-page-text">Unable to load projects right now. Use GitHub Pages, Live Server, or another hosted server.</p>';
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        initProjectsPage();
      });
    </script>
  </body>
</html>
